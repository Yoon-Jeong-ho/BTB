objective: 이미지-텍스트 retrieval를 Recall@K, hard negative, 양방향 ranking 관점으로 읽는다.
prereqs:
  - cosine similarity 기본 감각
  - shared embedding space 직관
  - contrastive alignment 기초
key_terms:
  - image-text retrieval
  - Recall@1
  - Recall@K
  - bidirectional retrieval
  - hard negative
  - shared embedding space
runtime_observation_hooks:
  - similarity matrix shape
  - image→text Recall@1 / Recall@2
  - text→image Recall@1 / Recall@2
  - hardest negative pair
  - symmetric contrastive loss
required_outputs:
  - scratch metrics json
  - scratch svg figure
  - framework metrics json
  - analysis markdown
analysis_questions:
  - 왜 scratch에서는 image→text보다 text→image가 더 어려웠는가?
  - Recall@1과 Recall@2를 함께 읽으면 어떤 ranking 정보를 얻는가?
  - framework 학습 후 hard negative와 symmetric loss는 어떻게 달라졌는가?
